<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>鸡你太美翻译器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <!-- 顶部标题栏 -->
    <div class="header">
      <img src="icon.jpg" class="header-icon" alt="IKUN" />
      <div class="header-text">
        <h1>鸡你太美翻译器</h1>
        <p>蔡徐坤专属加密语言</p>
        <p class="author-tag">制作：赤版</p>
      </div>
    </div>

    <!-- 密钥输入区 -->
    <div class="card key-card">
      <div class="card-title">🔑 加密密钥</div>
      <div class="key-input-row">
        <input
          type="text"
          id="keyInput"
          class="key-input"
          placeholder="输入4~8位密钥"
          maxlength="8"
          autocomplete="off"
        />
        <button class="btn-gen-key" id="genKeyBtn" onclick="generateRandomKey()">随机</button>
      </div>
      <div class="key-hint">密钥支持字母、数字，加密解密须使用相同密钥</div>
    </div>

    <!-- 模式切换 -->
    <div class="mode-switcher">
      <button class="mode-btn active" id="encodeBtn" onclick="switchMode('encode')">
        📝 加密模式
      </button>
      <button class="mode-btn" id="decodeBtn" onclick="switchMode('decode')">
        🔓 解密模式
      </button>
    </div>

    <!-- 输入区 -->
    <div class="card">
      <div class="card-title" id="inputLabel">✏️ 输入原文</div>
      <textarea
        id="inputText"
        class="text-area"
        placeholder="在这里输入要加密的文字..."
        rows="5"
      ></textarea>
      <div class="btn-row">
        <button class="btn-secondary" onclick="clearInput()">清空</button>
        <button class="btn-primary" id="actionBtn" onclick="doAction()">🐔 开始加密</button>
      </div>
    </div>

    <!-- 输出区 -->
    <div class="card">
      <div class="card-title" id="outputLabel">🎵 鸡你太美语言</div>
      <div class="output-box" id="outputText">
        <span class="output-placeholder">翻译结果将显示在这里...</span>
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="copyOutput()">📋 复制</button>
        <button class="btn-secondary" onclick="swapIO()">🔄 互换</button>
      </div>
    </div>

    <!-- 作者主页卡片 -->
    <div class="card author-card">
      <div class="author-header">
        <img src="avatar.jpg" class="author-avatar" alt="avatar" />
        <div class="author-info">
          <div class="author-name">赤版</div>
          <a href="https://www.douyin.com/user/self?from_tab_name=%E8%B5%A4%E7%89%88" target="_blank" rel="noopener" class="author-douyin">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12.53.02C13.84 0 15.14.01 16.44 0c.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
            点击访问抖音主页
          </a>
        </div>
      </div>
      <div class="author-slogan">各位义父点点关注点点赞吧</div>
      <button class="btn-feed" id="feedBtn" onclick="showReward()">❤️ 投喂一下</button>
    </div>

    <!-- 赞赏码弹窗 -->
    <div class="reward-overlay" id="rewardOverlay">
      <div class="reward-modal">
        <div class="reward-close" onclick="hideReward()">✕</div>
        <img src="赞赏码.jpg" class="reward-img" alt="赞赏码" />
        <div class="reward-timer" id="rewardTimer">10秒后自动关闭</div>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="jntm.js"></script>
  <script src="app.js"></script>
</body>
</html>
